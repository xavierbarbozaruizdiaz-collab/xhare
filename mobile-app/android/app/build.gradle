apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

def projectRoot = rootDir.getAbsoluteFile().getParentFile().getAbsolutePath()

// Flavor usado para instalar "driver" y "pasajero" como apps separadas en Android.
// Expo normalmente debería tomar esto de app.config.js, pero este proyecto tiene
// applicationId hardcodeado; por eso lo hacemos dependiente de env var.
def appFlavor = (System.getenv('APP_FLAVOR') ?: System.getenv('EXPO_PUBLIC_APP_FLAVOR') ?: 'passenger') as String
def applicationIdValue = appFlavor == 'driver' ? 'com.xhare.driver' : 'com.xhare.app'

// Ensure generated JNI codegen folders exist so `gradlew clean` never fails.
// Some RN/Expo autolinking CMake files reference these paths even during clean tasks.
def codegenJniDirs = [
  new File(projectRoot, "node_modules/@react-native-community/datetimepicker/android/build/generated/source/codegen/jni")
]
def ensureCodegenStubs = { ->
  // Stub for datetimepicker codegen JNI target referenced by autolinking CMake.
  def dtpDir = codegenJniDirs[0]
  if (!dtpDir.exists()) dtpDir.mkdirs()
  def cmakeLists = new File(dtpDir, "CMakeLists.txt")
  if (!cmakeLists.exists()) {
    cmakeLists.text = """\
cmake_minimum_required(VERSION 3.13)
project(react_codegen_RNDateTimePickerCGen_stub)

# This is a stub to keep `gradlew clean` reliable when codegen outputs are absent.
add_library(react_codegen_RNDateTimePickerCGen INTERFACE)
""".stripIndent()
  }
}
ensureCodegenStubs()

// The clean lifecycle runs `:react-native-community_datetimepicker:clean` which may delete these folders again.
// Re-create them right before any external native clean task executes to keep `gradlew clean` reliable.
tasks.matching { it.name.startsWith("externalNativeBuildClean") }.configureEach { t ->
  t.doFirst {
    ensureCodegenStubs()
  }
}

// Expo/RN autolinking + codegen can make `externalNativeBuildClean*` brittle on Windows
// when generated JNI code isn't present. We still want `gradlew clean` to be reliable
// as part of the official local release flow, so we skip those native clean tasks.
tasks.matching { it.name in ["externalNativeBuildCleanDebug", "externalNativeBuildCleanRelease"] }.configureEach { t ->
  t.enabled = false
}

/**
 * This is the configuration block to customize your React Native Android app.
 * By default you don't need to apply any configuration, just uncomment the lines you need.
 */
react {
    entryFile = file(["node", "-e", "require('expo/scripts/resolveAppEntry')", projectRoot, "android", "absolute"].execute(null, rootDir).text.trim())
    reactNativeDir = new File(["node", "--print", "require.resolve('react-native/package.json')"].execute(null, rootDir).text.trim()).getParentFile().getAbsoluteFile()
    hermesCommand = new File(["node", "--print", "require.resolve('hermes-compiler/package.json', { paths: [require.resolve('react-native/package.json')] })"].execute(null, rootDir).text.trim()).getParentFile().getAbsolutePath() + "/hermesc/%OS-BIN%/hermesc"
    codegenDir = new File(["node", "--print", "require.resolve('@react-native/codegen/package.json', { paths: [require.resolve('react-native/package.json')] })"].execute(null, rootDir).text.trim()).getParentFile().getAbsoluteFile()

    enableBundleCompression = (findProperty('android.enableBundleCompression') ?: false).toBoolean()
    // Use Expo CLI to bundle the app, this ensures the Metro config
    // works correctly with Expo projects.
    cliFile = new File(["node", "--print", "require.resolve('@expo/cli', { paths: [require.resolve('expo/package.json')] })"].execute(null, rootDir).text.trim())
    bundleCommand = "export:embed"

    /* Folders */
     //   The root of your project, i.e. where "package.json" lives. Default is '../..'
    // root = file("../../")
    //   The folder where the react-native NPM package is. Default is ../../node_modules/react-native
    // reactNativeDir = file("../../node_modules/react-native")
    //   The folder where the react-native Codegen package is. Default is ../../node_modules/@react-native/codegen
    // codegenDir = file("../../node_modules/@react-native/codegen")

    /* Variants */
    //   The list of variants to that are debuggable. For those we're going to
    //   skip the bundling of the JS bundle and the assets. By default is just 'debug'.
    //   If you add flavors like lite, prod, etc. you'll have to list your debuggableVariants.
    // debuggableVariants = ["liteDebug", "prodDebug"]

    /* Bundling */
    //   A list containing the node command and its flags. Default is just 'node'.
    // nodeExecutableAndArgs = ["node"]

    //
    //   The path to the CLI configuration file. Default is empty.
    // bundleConfig = file(../rn-cli.config.js)
    //
    //   The name of the generated asset file containing your JS bundle
    // bundleAssetName = "MyApplication.android.bundle"
    //
    //   The entry file for bundle generation. Default is 'index.android.js' or 'index.js'
    // entryFile = file("../js/MyApplication.android.js")
    //
    //   A list of extra flags to pass to the 'bundle' commands.
    //   See https://github.com/react-native-community/cli/blob/main/docs/commands.md#bundle
    // extraPackagerArgs = []

    /* Hermes Commands */
    //   The hermes compiler command to run. By default it is 'hermesc'
    // hermesCommand = "$rootDir/my-custom-hermesc/bin/hermesc"
    //
    //   The list of flags to pass to the Hermes compiler. By default is "-O", "-output-source-map"
    // hermesFlags = ["-O", "-output-source-map"]

    /* Autolinking */
    autolinkLibrariesWithApp()
}

/**
 * Set this to true in release builds to optimize the app using [R8](https://developer.android.com/topic/performance/app-optimization/enable-app-optimization).
 */
def enableMinifyInReleaseBuilds = (findProperty('android.enableMinifyInReleaseBuilds') ?: false).toBoolean()

/**
 * The preferred build flavor of JavaScriptCore (JSC)
 *
 * For example, to use the international variant, you can use:
 * `def jscFlavor = 'org.webkit:android-jsc-intl:+'`
 *
 * The international variant includes ICU i18n library and necessary data
 * allowing to use e.g. `Date.toLocaleString` and `String.localeCompare` that
 * give correct results when using with locales other than en-US. Note that
 * this variant is about 6MiB larger per architecture than default.
 */
def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

android {
    ndkVersion rootProject.ext.ndkVersion

    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    // Mantenemos el namespace fijo para que el código nativo bajo
    // `android/app/src/main/java/com/xhare/app/...` siga encontrando `R` y `BuildConfig`.
    namespace 'com.xhare.app'
    defaultConfig {
        if (applicationIdValue == 'com.xhare.driver') {
            applicationId 'com.xhare.driver'
        } else {
            applicationId 'com.xhare.app'
        }
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0.0"

        buildConfigField "String", "REACT_NATIVE_RELEASE_LEVEL", "\"${findProperty('reactNativeReleaseLevel') ?: 'stable'}\""

        // Nombre mostrado en el launcher.
        // Usamos resValue porque app_name viene de strings.xml generado.
        resValue "string", "app_name", (appFlavor == 'driver' ? 'Xhare Driver' : 'Xhare')

        // Launcher/Application alineados con applicationId: Expo ejecuta {applicationId}/.MainActivity
        def mainActivityClass = appFlavor == 'driver' ? 'com.xhare.driver.MainActivity' : 'com.xhare.app.MainActivity'
        def mainApplicationClass = appFlavor == 'driver' ? 'com.xhare.driver.MainApplication' : 'com.xhare.app.MainApplication'
        // Maps SDK: misma variable que en mobile-app/.env y EAS Secrets. Nunca commitear la key en este repo.
        // Orden: env del proceso → -P / gradle.properties del proyecto → android/local.properties (gitignored).
        def envMapsKey = (System.getenv('GOOGLE_MAPS_ANDROID_API_KEY') ?: '').trim()
        def propMapsKey = (findProperty('GOOGLE_MAPS_ANDROID_API_KEY') ?: '').toString().trim()
        def localMapsKey = ''
        def lp = rootProject.file('local.properties')
        if (lp.exists()) {
            def p = new Properties()
            lp.withInputStream { p.load(it) }
            localMapsKey = (p.getProperty('GOOGLE_MAPS_ANDROID_API_KEY') ?: '').trim()
        }
        def mapsKey = envMapsKey ?: propMapsKey ?: localMapsKey
        if (!mapsKey) {
            throw new GradleException(
                'GOOGLE_MAPS_ANDROID_API_KEY no está definida. Definila en:\n' +
                '  • variable de entorno GOOGLE_MAPS_ANDROID_API_KEY, o\n' +
                '  • mobile-app/android/local.properties: GOOGLE_MAPS_ANDROID_API_KEY=… (archivo ignorado por git), o\n' +
                '  • ./gradlew -PGOOGLE_MAPS_ANDROID_API_KEY=…\n' +
                'Expo/EAS: misma variable en .env local o EAS Secrets para que prebuild/app.config la inyecte.'
            )
        }
        manifestPlaceholders = [
            mainActivityClass     : mainActivityClass,
            mainApplicationClass  : mainApplicationClass,
            GOOGLE_MAPS_ANDROID_API_KEY: mapsKey,
        ]
    }
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            // Caution! In production, you need to generate your own keystore file.
            // see https://reactnative.dev/docs/signed-apk-android.
            signingConfig signingConfigs.debug
            def enableShrinkResources = findProperty('android.enableShrinkResourcesInReleaseBuilds') ?: 'false'
            shrinkResources enableShrinkResources.toBoolean()
            minifyEnabled enableMinifyInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
            def enablePngCrunchInRelease = findProperty('android.enablePngCrunchInReleaseBuilds') ?: 'true'
            crunchPngs enablePngCrunchInRelease.toBoolean()
        }
    }
    packagingOptions {
        jniLibs {
            def enableLegacyPackaging = findProperty('expo.useLegacyPackaging') ?: 'false'
            useLegacyPackaging enableLegacyPackaging.toBoolean()
        }
    }
    androidResources {
        ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:!CVS:!thumbs.db:!picasa.ini:!*~'
    }
}

// Si `android/` no está versionado o se clonó sin mipmaps, los XML en mipmap-anydpi-v26 apuntan a
// @mipmap/ic_launcher_* inexistentes y el launcher muestra el ícono blueprint del sistema.
def syncLauncherIconsScript = new File(projectRoot, "scripts/sync-android-launcher-icons.cjs")
def launcherForegroundWebp = file("src/main/res/mipmap-mdpi/ic_launcher_foreground.webp")
def splashLogoPng = file("src/main/res/drawable/splashscreen_logo.png")

tasks.register("ensureLauncherMipmapsFromExpo", Exec) {
    group = "build"
    description = "Genera mipmaps del launcher y splash desde app.config.js + assets/ (solo si faltan)."
    workingDir = file(projectRoot)
    environment "APP_FLAVOR", "passenger"
    commandLine "node", syncLauncherIconsScript.absolutePath
    onlyIf {
        syncLauncherIconsScript.exists() && (
            !launcherForegroundWebp.exists() || !splashLogoPng.exists()
        )
    }
}

// Prepara recursos del launcher según el flavor (para que driver y passenger se vean distintos).
// Nota: no dependemos del icon generado por Expo, porque en este proyecto los assets no se regeneran por flavor.
def resRoot = file("src/main/res")
def mipmapDirs = resRoot.listFiles()?.findAll { it.isDirectory() && it.name.startsWith("mipmap-") } ?: []
def iconBackupRoot = new File(buildDir, "xhare_icon_backup")
def assetsDir = new File(projectRoot, "../assets")
def monoPngAsset = new File(assetsDir, "android-icon-monochrome.png")

tasks.register("prepareLauncherResources") {
    dependsOn("ensureLauncherMipmapsFromExpo")
    doLast {
        def isDriverBuild = appFlavor == 'driver'
        if (!isDriverBuild) return

        mipmapDirs.each { dir ->
            // Caso principal: foreground como PNG.
            def fgPng = new File(dir, "ic_launcher_foreground.png")
            if (fgPng.exists() && monoPngAsset.exists()) {
                def backup = new File(iconBackupRoot, "${dir.name}/ic_launcher_foreground.png")
                if (!backup.exists()) {
                    backup.parentFile.mkdirs()
                    backup.setBytes(fgPng.bytes)
                }
                fgPng.setBytes(monoPngAsset.bytes)
            }

            // Fallback: si aún existiera el foreground como WEBP, lo seguimos intercambiando.
            def fgWebp = new File(dir, "ic_launcher_foreground.webp")
            def monoWebp = new File(dir, "ic_launcher_monochrome.webp")
            if (fgWebp.exists() && monoWebp.exists()) {
                def backup = new File(iconBackupRoot, "${dir.name}/ic_launcher_foreground.webp")
                if (!backup.exists()) {
                    backup.parentFile.mkdirs()
                    backup.setBytes(fgWebp.bytes)
                }
                fgWebp.setBytes(monoWebp.bytes)
            }
        }
    }
}

tasks.register("restoreLauncherResources") {
    doLast {
        def isDriverBuild = appFlavor == 'driver'
        if (!isDriverBuild) return

        mipmapDirs.each { dir ->
            def fgPng = new File(dir, "ic_launcher_foreground.png")
            def backupPng = new File(iconBackupRoot, "${dir.name}/ic_launcher_foreground.png")
            if (fgPng.exists() && backupPng.exists()) {
                fgPng.setBytes(backupPng.bytes)
                backupPng.delete()
            }

            def fgWebp = new File(dir, "ic_launcher_foreground.webp")
            def backupWebp = new File(iconBackupRoot, "${dir.name}/ic_launcher_foreground.webp")
            if (fgWebp.exists() && backupWebp.exists()) {
                fgWebp.setBytes(backupWebp.bytes)
                backupWebp.delete()
            }
        }
    }
}

// Aseguramos que los recursos del launcher se preparen antes del build release.
tasks.matching { it.name == "preReleaseBuild" || it.name == "preDebugBuild" }.configureEach {
    it.dependsOn "prepareLauncherResources"
}

// Luego, al finalizar el build, restauramos los recursos para que passenger (siguiente build) no
// herede el ícono modificado de driver.
tasks.matching { it.name == "assembleRelease" || it.name == "assembleDebug" }.configureEach {
    it.finalizedBy "restoreLauncherResources"
}

// Apply static values from `gradle.properties` to the `android.packagingOptions`
// Accepts values in comma delimited lists, example:
// android.packagingOptions.pickFirsts=/LICENSE,**/picasa.ini
["pickFirsts", "excludes", "merges", "doNotStrip"].each { prop ->
    // Split option: 'foo,bar' -> ['foo', 'bar']
    def options = (findProperty("android.packagingOptions.$prop") ?: "").split(",");
    // Trim all elements in place.
    for (i in 0..<options.size()) options[i] = options[i].trim();
    // `[] - ""` is essentially `[""].filter(Boolean)` removing all empty strings.
    options -= ""

    if (options.length > 0) {
        println "android.packagingOptions.$prop += $options ($options.length)"
        // Ex: android.packagingOptions.pickFirsts += '**/SCCS/**'
        options.each {
            android.packagingOptions[prop] += it
        }
    }
}

dependencies {
    // The version of react-native is set by the React Native Gradle Plugin
    implementation("com.facebook.react:react-android")

    def isGifEnabled = (findProperty('expo.gif.enabled') ?: "") == "true";
    def isWebpEnabled = (findProperty('expo.webp.enabled') ?: "") == "true";
    def isWebpAnimatedEnabled = (findProperty('expo.webp.animated') ?: "") == "true";

    if (isGifEnabled) {
        // For animated gif support
        implementation("com.facebook.fresco:animated-gif:${expoLibs.versions.fresco.get()}")
    }

    if (isWebpEnabled) {
        // For webp support
        implementation("com.facebook.fresco:webpsupport:${expoLibs.versions.fresco.get()}")
        if (isWebpAnimatedEnabled) {
            // Animated webp support
            implementation("com.facebook.fresco:animated-webp:${expoLibs.versions.fresco.get()}")
        }
    }

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}
